  #     - uses: actions/checkout@v4
  #     - uses: subosito/flutter-action@v2
  #       with:
  #         flutter-version: '3.24.0'
  #         channel: 'stable'
  #     - run: flutter pub get
  #     - run: flutter build ios --release --no-codesign
