name: Build Android

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate icons
        run: |
          python3 -m venv /tmp/venv
          source /tmp/venv/bin/activate
          pip install pillow
          python3 scripts/gen_icons.py

      - name: Backup Dart source only
        run: |
          cp -r lib /tmp/water_tracker_lib
          cp pubspec.yaml /tmp/water_tracker_pubspec.yaml

      - name: Create Flutter project (generates all build files)
        run: flutter create --org com.timenw --project-name water_tracker .

      - name: Upgrade Kotlin version for plugin compatibility
        run: |
          sed -i 's/id "org.jetbrains.kotlin.android" version "1.7.10" apply false/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/' android/settings.gradle
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.24"/' android/build.gradle

      - name: Restore Dart source only (keep flutter-generated Android files)
        run: |
          rm -rf lib
          cp -r /tmp/water_tracker_lib lib
          cp /tmp/water_tracker_pubspec.yaml pubspec.yaml

      - name: Copy generated icons to Android
        run: |
          mkdir -p android/app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          cp assets/android-mipmap-mdpi-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/android-mipmap-hdpi-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/android-mipmap-xhdpi-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/android-mipmap-xxhdpi-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/android-mipmap-xxxhdpi-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install dependencies
        run: flutter pub get

      - name: Debug - Check Android config
        run: |
          echo "=== android/app/build.gradle ==="
          cat android/app/build.gradle
          echo "=== android/settings.gradle ==="
          cat android/settings.gradle
          echo "=== flutter doctor ==="
          flutter doctor -v

      - name: Build APK (debug)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: flutter build apk --debug

      - name: Build APK (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build apk --release

      - name: Build App Bundle (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload AAB
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
