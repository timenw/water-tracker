name: Build Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Backup Dart source
        run: |
          cp -r lib /tmp/water_tracker_lib
          cp pubspec.yaml /tmp/water_tracker_pubspec.yaml

      - name: Create Flutter project
        run: flutter create --org com.timenw --project-name water_tracker .

      - name: Restore Dart source
        run: |
          rm -rf lib
          cp -r /tmp/water_tracker_lib lib
          cp /tmp/water_tracker_pubspec.yaml pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
