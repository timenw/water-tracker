name: Build Android APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          export PATH="/opt/gradle-8.5/bin:$PATH"
          gradle --version
          echo "GRADLE_HOME=/opt/gradle-8.5" >> $GITHUB_ENV
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: |
          cd android
          gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version info
        run: |
          VERSION=$(grep "versionName" android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DATE=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          APK_NAME="WaterTracker-v${VERSION}-${DATE}-${SHORT_SHA}.apk"
          cp android/app/build/outputs/apk/debug/app-debug.apk "/tmp/${APK_NAME}"
          echo "APK_NAME=${APK_NAME}" >> $GITHUB_ENV
          echo "Renamed APK to: ${APK_NAME}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: water-tracker-debug
          path: /tmp/${{ env.APK_NAME }}

      - name: Upload to Release (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.APK_NAME }}
          name: "喝水提醒 ${{ env.APK_NAME }}"
          files: /tmp/${{ env.APK_NAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
