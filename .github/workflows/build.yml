name: Build Android

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate icons
        run: |
          python3 -m venv /tmp/venv
          source /tmp/venv/bin/activate
          pip install pillow
          python3 scripts/gen_icons.py

      - name: Backup source code
        run: |
          cp -r lib /tmp/water_tracker_lib
          cp -r assets /tmp/water_tracker_assets
          cp -r scripts /tmp/water_tracker_scripts
          cp pubspec.yaml /tmp/water_tracker_pubspec.yaml

      - name: Create Flutter project
        run: flutter create --org com.timenw --project-name water_tracker .

      - name: Restore source code
        run: |
          rm -rf lib assets scripts
          cp -r /tmp/water_tracker_lib lib
          cp -r /tmp/water_tracker_assets assets
          cp -r /tmp/water_tracker_scripts scripts
          cp /tmp/water_tracker_pubspec.yaml pubspec.yaml

      - name: Copy icons
        run: |
          mkdir -p android/app/src/main/res/{mipmap-mdpi,mipmap-hdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}
          cp assets/android-mipmap-mdpi-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/android-mipmap-hdpi-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/android-mipmap-xhdpi-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/android-mipmap-xxhdpi-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/android-mipmap-xxxhdpi-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (verbose)
        run: flutter build apk --debug --verbose 2>&1 | tail -100

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
